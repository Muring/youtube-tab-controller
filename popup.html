<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YouTube Controller</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 310px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }

    .header {
      display:flex; align-items:center; gap:8px;
      padding:13px 16px 10px;
      border-bottom:1px solid #222;
    }
    .header > svg { width:20px; height:20px; color:#ff0000; flex-shrink:0; }
    .header span { font-size:13px; font-weight:600; color:#e0e0e0; letter-spacing:.3px; flex:1; }
    .empty { padding:32px 16px; text-align:center; }
    .empty .icon { font-size:36px; margin-bottom:10px; opacity:.35; }
    .empty p { font-size:12px; color:#999; line-height:1.6; }

    .tabs-list { max-height:400px; overflow-y:auto; }
    .tabs-list::-webkit-scrollbar { width:3px; }
    .tabs-list::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

    .tab-card { padding:11px 14px 10px; border-bottom:1px solid #1c1c1c; }
    .tab-card:hover { background:#161616; }

    .tab-top {
      display:flex; align-items:center; gap:10px;
      margin-bottom:9px; cursor:pointer;
    }
    .thumb-wrap {
      width:80px; height:45px; border-radius:4px;
      overflow:hidden; flex-shrink:0; background:#1e1e1e; position:relative;
    }
    .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb-fallback {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center; color:#666;
    }
    .thumb-fallback svg { width:18px; height:18px; }

    .tab-meta { flex:1; min-width:0; }
    .tab-title {
      font-size:12px; color:#e0e0e0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      line-height:1.35; margin-bottom:3px;
    }
    .tab-status { font-size:11px; color:#aaa; display:flex; align-items:center; gap:5px; }
    .dot { width:6px; height:6px; border-radius:50%; background:#666; flex-shrink:0; }
    .dot.playing { background:#1db954; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .progress { margin-bottom:9px; }
    .times {
      display:flex; justify-content:space-between;
      font-size:11px; color:#aaa; margin-bottom:4px;
      font-variant-numeric:tabular-nums;
    }
    .bar-bg {
      width:100%; height:4px; background:#2a2a2a;
      border-radius:2px; cursor:pointer; transition:height .1s;
    }
    .bar-bg:hover { height:6px; }
    .bar-fill { height:100%; background:#ff0000; border-radius:2px; pointer-events:none; }
    .bar-bg:hover .bar-fill { background:#ff4444; }

    .controls { display:flex; align-items:center; justify-content:center; gap:4px; }
    .btn {
      width:30px; height:30px; border-radius:50%;
      border:none; background:#222; color:#ccc;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .12s, color .12s;
    }
    .btn:hover { background:#2e2e2e; color:#fff; }
    .btn:active { transform:scale(.9); }
    .btn svg { width:14px; height:14px; pointer-events:none; }

    .btn-play {
      width:36px!important; height:36px!important;
      background:#ff0000!important; color:#fff!important;
    }
    .btn-play:hover { background:#cc0000!important; }
    .btn-play svg { width:16px!important; height:16px!important; }

    .btn-mute.is-muted { color:#ff5555; }

    /* info 아이콘 */
    .btn-info {
      width:26px; height:26px; border-radius:50%;
      border:none; background:transparent; color:#aaa;
      cursor:default; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; position:relative;
    }
    .btn-info svg { width:14px; height:14px; pointer-events:none; }
    .btn-info:hover { color:#e0e0e0; }
    .btn-info .tooltip {
      display:none; position:absolute; top:calc(100% + 6px); right:0;
      background:#1e1e1e; border:1px solid #444; border-radius:6px;
      padding:7px 10px; font-size:11px; color:#ccc; line-height:1.5;
      white-space:nowrap; z-index:99; pointer-events:none;
    }
    .btn-info:hover .tooltip { display:block; }

    /* 자동 재개 버튼 */
    .btn-auto { position:relative; color:#999; }
    .btn-auto:hover { color:#ccc; }
    .btn-auto.is-on { color:#1db954; background:#1a2e1a; }
    .btn-auto.is-on:hover { background:#1e361e; color:#22d15e; }
    .btn-auto svg { width:13px; height:13px; }

    .footer {
      padding:7px 14px; font-size:10px;
      color:#777; text-align:center; border-top:1px solid #1a1a1a;
    }
    .loading { padding:22px; text-align:center; color:#888; font-size:12px; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
    </svg>
    <span>YouTube Tab Controller</span>
    <div class="btn-info">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <div class="tooltip">한 번도 열지 않은 탭은<br>목록에 표시되지 않아요</div>
    </div>
  </div>
  <div id="root"><div class="loading">로딩 중...</div></div>
  <div class="footer">제목 클릭 시 해당 탭으로 이동</div>
  <script src="popup.js"></script>
</body>
</html>
